<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Diamond Pulse — Player Spotlight</title>
  <script src="js/config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Card — bottom left, same proportions as panel overlay ── */
    #spo-card {
      position: absolute;
      bottom: 64px;
      left: 64px;

      /* Same size as a mobile viewport ~390×480px but upscaled for broadcast */
      width: 520px;
      height: 320px;

      display: flex;
      flex-direction: column;
      background: rgba(0,0,0,0.96);
      border: 1px solid rgba(255,255,255,0.09);

      /* Hidden by default */
      opacity: 0;
      transform: translateX(-24px);
      pointer-events: none;
      transition: opacity 0.45s cubic-bezier(0.22,1,0.36,1),
                  transform 0.45s cubic-bezier(0.22,1,0.36,1);
    }
    #spo-card.visible {
      opacity: 1;
      transform: translateX(0);
    }

    /* Body — left info + right photo, same as .spo-body in panel */
    .spo-body {
      flex: 1;
      display: flex;
      align-items: stretch;
      min-height: 0;
    }

    /* Left 44% — number, name, position bottom-aligned, same as .spo-info */
    .spo-info {
      width: 44%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px 18px 32px 22px;
      gap: 4px;
    }

    .spo-number {
      font-size: 64px;
      font-weight: 700;
      color: #FF4500;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 40px rgba(255,69,0,0.5);
    }

    .spo-name {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      line-height: 1.2;
      word-break: break-word;
    }

    .spo-pos {
      font-size: 11px;
      color: rgba(255,255,255,0.38);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-top: 4px;
    }

    /* Right 56% — photo or placeholder, same as .spo-photo-wrap */
    .spo-photo-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }

    .spo-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    .spo-photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 96px;
      opacity: .15;
      user-select: none;
    }
  </style>
</head>
<body>

  <div id="spo-card">
    <div class="spo-body">
      <div class="spo-info">
        <div class="spo-number" id="spo-num">#</div>
        <div class="spo-name"   id="spo-name">—</div>
        <div class="spo-pos"    id="spo-pos"></div>
      </div>
      <div class="spo-photo-wrap" id="spo-photo-wrap">
        <div class="spo-photo-placeholder" id="spo-placeholder">🧢</div>
        <img class="spo-photo" id="spo-photo" src="" alt="" style="display:none">
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = APP_CONFIG.supabaseUrl;
    const SUPABASE_KEY = APP_CONFIG.supabaseKey;

    let isVisible = false;

    async function poll() {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/config?key=eq.spotlight&select=value`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const rows = await res.json();
        const data = rows?.[0]?.value || {};

        if (data.active && !isVisible) {
          showCard(data);
        } else if (!data.active && isVisible) {
          hideCard();
        }
      } catch(e) { /* silent */ }
    }

    function showCard(data) {
      isVisible = true;

      document.getElementById('spo-num').textContent  = data.number   || '#';
      document.getElementById('spo-name').textContent = data.name      || '—';
      document.getElementById('spo-pos').textContent  = data.position  || '';

      const img = document.getElementById('spo-photo');
      const ph  = document.getElementById('spo-placeholder');
      if (data.photo) {
        img.src = data.photo; img.style.display = 'block'; ph.style.display = 'none';
      } else {
        img.style.display = 'none'; ph.style.display = 'flex';
      }

      document.getElementById('spo-card').classList.add('visible');
    }

    function hideCard() {
      isVisible = false;
      document.getElementById('spo-card').classList.remove('visible');
    }

    poll();
    setInterval(poll, 1500);
  </script>
</body>
</html>
